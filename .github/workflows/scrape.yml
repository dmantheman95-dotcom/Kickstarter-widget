name: Scrape Kāla Kickstarter

on:
  schedule:
    # Every 15 minutes, offset from :00/:15/:30/:45 since those are the
    # busiest moments on GitHub's scheduler (everyone's cron jobs fire
    # there), which can cause runs to be silently skipped under load.
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: {} # lets you trigger a manual run from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: npm run scrape

      - name: Commit data.json (and debug.log if present) if changed
        run: |
          git config user.name "kala-tracker-bot"
          git config user.email "actions@github.com"
          git add data.json
          if [ -f debug.log ]; then git add debug.log; fi
          git diff --quiet --cached || git commit -m "Update follower/backer count"
          git push
